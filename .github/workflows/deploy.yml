name: Build and Deploy
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install and Build
        run: |
          echo "1 : ${{ env.REACT_APP_GITHUB_TOKEN }}"
          echo "2 : ${{ secrets.API_KEY }}"
        env:
          REACT_APP_GITHUB_TOKEN: ${{ secrets.API_KEY }}

